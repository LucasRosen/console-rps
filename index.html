<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Console RPS</title>
</head>
<body>
    <script>
        const choices = ["rock", "paper", "scissors"];

        function getPlayerChoice() {
            let playerChoice = prompt("Rock, paper, or scissors?", "rock");
            if (playerChoice) {playerChoice = playerChoice.toLowerCase()};

            if (choices.includes(playerChoice)) {
                return playerChoice;
            } else {
                console.log(`${playerChoice} is not a valid choice.`);
                getPlayerChoice();
            }
        }

        function getComputerChoice() {
            return choices[Math.floor(Math.random() * choices.length)];
        }

        function evaulateChoices(playerChoice, computerChoice) {
            if (playerChoice === computerChoice) {
                return "draw";
            } else if (
                (playerChoice === "rock" && computerChoice === "scissors")
                || (playerChoice === "paper" && computerChoice === "rock")
                || (playerChoice === "scissors" && computerChoice === "paper")) {
                return "player";
            } else {
                return "computer";
            }
        }

        function playRound() {
            let playerChoice = getPlayerChoice();
            let computerChoice = getComputerChoice();

            console.log(`Player: ${playerChoice}`);
            console.log(`Computer: ${computerChoice}`);

            let result = evaulateChoices(playerChoice, computerChoice);
            if (result === "player") {
                console.log(`You win! ${playerChoice} beats ${computerChoice}!`);
            } else if (result === "computer") {
                console.log(`You lose! ${computerChoice} beats ${playerChoice}!`);
            } else {
                console.log("Draw!");
            }

            return result;
        }

        function playGame() {
            let playerScore = 0;
            let computerScore = 0;
            let draws = 0;

            for (let i = 0; i < 5; i++) {
                let result = playRound();

                if (result === "player") {
                    playerScore++;
                } else if (result === "computer") {
                    computerScore++;
                } else {
                    draws++
                }
            }

            console.log(`You: ${playerScore}`);
            console.log(`Computer: ${computerScore}`);
            console.log(`Draws: ${draws}`);
        }

        playGame();
    </script>
</body>
</html>
